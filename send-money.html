<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senou Pay — Envoyer de l'argent</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>
  <div class="app-frame">

    <div id="app-header"></div>
    <script>
      window.SENOU_HEADER_OPTIONS = { showBack: true };
    </script>

    <div class="page-container send-money-body">
      <h1 class="send-money-title">Envoyer de l'argent</h1>
      <p class="send-money-subtitle">Testez la simulation d'envoi — aucune authentification n'est requise pour essayer.</p>

      <div class="card card--narrow" style="margin-top: var(--space-6);">
        <div class="amount-panels amount-panels--flush">
          <div class="amount-panel">
            <div class="amount-panel-top">
              <span class="field-label">Vous envoyez</span>
              <img src="assets/icons/flag-benin.svg" alt="Bénin" width="18" height="18" class="amount-flag">
            </div>
            <input id="send-money-amount-xof" class="amount-input" type="number" min="0" inputmode="numeric" placeholder="0">
          </div>

          <div class="amount-swap-wrap">
            <button type="button" id="send-money-swap-btn" class="amount-swap-btn" aria-label="Inverser les champs">
              <img src="assets/icons/icon-swap.svg" alt="">
            </button>
          </div>

          <div class="amount-panel amount-panel--result">
            <div class="amount-panel-top">
              <span class="field-label">Le bénéficiaire reçoit</span>
              <img src="assets/icons/flag-france.svg" alt="France" width="18" height="18" class="amount-flag">
            </div>
            <input id="send-money-amount-eur" class="amount-input conversion-preview" type="number" min="0" inputmode="decimal" placeholder="0" readonly>
          </div>
        </div>

        <p class="rate-caption">Taux fixe : 1 € = 655.957 XOF</p>
        <button id="send-money-continue-btn" class="header-cta header-cta--on-light btn-block" style="margin-top: var(--space-4); justify-content: center;">Envoyer</button>
      </div>
    </div>

  </div>

  <script src="js/state.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/format.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/amount-swap.js"></script>
  <script src="js/screens/send-money.js"></script>
</body>
</html>

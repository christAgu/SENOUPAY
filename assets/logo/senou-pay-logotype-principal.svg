<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="500" height="300" rx="24" fill="#241B2E"/>
  <g stroke="#C06CE8" stroke-width="11" stroke-linecap="round" transform="translate(40,55)">
    <line x1="40" y1="11" x2="40" y2="69"/>
    <line x1="16" y1="25" x2="64" y2="55"/>
    <line x1="64" y1="25" x2="16" y2="55"/>
  </g>
  <text x="130" y="95" font-family="'Space Grotesk', Arial, sans-serif" font-size="52" font-weight="600" fill="#FCFAFE">Senou</text>
  <text x="130" y="152" font-family="'Space Grotesk', Arial, sans-serif" font-size="52" font-weight="600" fill="#FCFAFE">Pay</text>
  <text x="40" y="220" font-family="'Hanken Grotesk', Arial, sans-serif" font-size="19" fill="#C9A9D4">Payer, envoyer, suivre son argent —</text>
  <text x="40" y="246" font-family="'Hanken Grotesk', Arial, sans-serif" font-size="19" fill="#FCFAFE">en toute simplicité.</text>
</svg>
